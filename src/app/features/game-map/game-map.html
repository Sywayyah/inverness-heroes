<div class="map">
  {{ stateService.activeArea()!.params.areaName }}

  <div class="rows">
    @for (row of stateService.activeArea()!.cells.cells; track $index) {
      <div class="row">
        @for (cell of row; track $index) {
          @let cellRoom = cell.room();
          <div class="cell" [style.background-image]="`url('${cell.backgroundImg()}')`">
            @if (cellRoom) {
              <img
                (click)="handleRoomClicked()"
                class="cell-room"
                [src]="cellRoom.params.img"
                alt=""
              />
            }
          </div>
        }
      </div>
    }
  </div>
</div>
