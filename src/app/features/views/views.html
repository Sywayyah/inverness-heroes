@switch (viewsService.state.activeView()) {
  @case (viewsService.View.MainScreen) {
    <app-main-screen></app-main-screen>
  }
  @case (viewsService.View.NewGame) {
    <app-new-game></app-new-game>
  }
  @case (viewsService.View.Battle) {
    <app-game-battle></app-game-battle>
  }
  @case (viewsService.View.Shop) {
    <app-shop></app-shop>
  }
}
